name: Publish to Hex

# Tag-triggered release: push a `v*` tag matching @version in mix.exs.
# workflow_dispatch exists because v0.1.0 was tagged before this workflow —
# the first publish can be run manually from the Actions tab without
# re-tagging.
#
# Requires the HEX_API_KEY repository secret (write key for the package).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # HEX_API_KEY lives in the `prod` environment (repo Settings ->
    # Environments), not in repo-level secrets — jobs only see environment
    # secrets when they declare the environment.
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"
      - run: mix deps.get
      - run: mix test
        env:
          MIX_ENV: test
      - name: Publish
        # No MIX_ENV override: hex.publish builds docs, and ex_doc is
        # `only: :dev` — the docs task doesn't exist outside dev.
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
